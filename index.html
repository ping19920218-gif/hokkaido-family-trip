const $ = (id) => document.getElementById(id);
let curDay = 1;

function esc(t){return (t==null?'':String(t)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function init(){
  $('ttl').textContent = STATE.trip.name;
  const f = STATE.flights;
  $('sub').textContent = `${f[0].date} ${f[0].fromTime}出发 · ${f[1].date} ${f[1].toTime}回港 · 自驾`;
  // day tabs
  const dt = $('daytabs'); dt.innerHTML='';
  STATE.days.forEach(d=>{
    const b=document.createElement('button'); b.className='daytab'+(d.n===curDay?' on':'');
    b.innerHTML=`D${d.n}<small>${d.date.slice(5)} ${d.dow}</small>`;
    b.onclick=()=>{curDay=d.n; renderItin(); [...dt.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');};
    dt.appendChild(b);
  });
  renderItin(); renderHotels(); renderFood(); renderBaby(); renderFallbacks(); renderTodos(); renderSos();
  // nav
  document.querySelectorAll('#nav button').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('on'));
      btn.classList.add('on');
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
      $('v-'+btn.dataset.v).classList.add('on');
      $('daytabs').classList.toggle('hide', btn.dataset.v!=='itin');
      window.scrollTo(0,0);
    };
  });
}

function renderItin(){
  const d = STATE.days.find(x=>x.n===curDay); if(!d)return;
  let h = `<div class="theme">📍 ${esc(d.theme)}</div>`;
  if(d.warning) h += `<div class="warn">${esc(d.warning)}</div>`;
  h += '<div class="tl">';
  (d.items||[]).forEach(it=>{
    h += `<div class="item"><div class="time">${esc(it.time)}</div><div class="ic"><div class="t">${esc(it.title)}</div>`+
         (it.desc?`<div class="d">${esc(it.desc)}</div>`:'')+`</div></div>`;
  });
  h += '</div>';
  if(d.feeding&&d.feeding.length){
    h += '<div class="feed"><h3>🍼 喂奶 / 换尿布点</h3>';
    d.feeding.forEach(fd=> h += `<div>· ${esc(fd.time)}　${esc(fd.place)}</div>`);
    h += '</div>';
  }
  if(d.hotel&&d.hotel.name) h += `<div class="feed" style="background:#f0eef7"><h3 style="color:#5b4b8a">🏨 今晚</h3><div style="color:#5b4b8a">${esc(d.hotel.name)}</div></div>`;
  $('v-itin').innerHTML = h;
}

function renderHotels(){
  let h='<div class="sec-title">住宿安排</div>';
  (STATE.hotels||[]).forEach(ho=>{
    h+=`<div class="card"><h3>${esc(ho.name||'')}</h3><div class="meta">`+
       (ho.night?`📅 ${esc(ho.night)}\n`:'')+(ho.room?`🛏 ${esc(ho.room)}\n`:'')+
       (ho.price?`💴 ${esc(ho.price)}\n`:'')+(ho.note?esc(ho.note):'')+`</div></div>`;
  });
  $('v-hotel').innerHTML=h;
}

function renderFood(){
  let h='<div class="sec-title">餐厅推荐（人均≤¥8000，海胆季/会席例外）</div>';
  (STATE.restaurants||[]).forEach(r=>{
    h+=`<div class="card"><h3>${esc(r.name||'')} <span class="tag">${esc(r.type||'')}</span></h3>`+
       `<div class="meta"><span class="tag">${esc(r.day||'')}</span><span class="tag">${esc(r.price||'')}</span>\n${esc(r.note||'')}</div></div>`;
  });
  $('v-food').innerHTML=h;
}

function renderBaby(){
  const g = STATE.baby_food_guide; if(!g){ $('v-baby').innerHTML=''; return; }
  const st = g.baby_status||{};
  let h = `<div class="sec-title">${esc(g.title||'宝宝辅食采购攻略')}</div>`;
  h += '<div class="card"><h3>📊 宝宝现在到哪了</h3><div class="meta">';
  if(st.age_at_trip) h += `🎂 ${esc(st.age_at_trip)}\n`;
  if(st.texture) h += `🥄 ${esc(st.texture)}\n`;
  if(st.frequency) h += `⏰ ${esc(st.frequency)}`;
  h += '</div>';
  if(st.tried){
    let tr='';
    for(const k in st.tried){ tr += `\n${esc(k)}：${(st.tried[k]||[]).map(esc).join('、')}`; }
    h += `<div class="meta" style="margin-top:8px"><b style="color:#1a7a8a">✅ 已吃过</b>${tr}</div>`;
  }
  if(st.allergen_done) h += `<div class="meta" style="margin-top:6px;color:#1a7a8a">致敏原已引入：${(st.allergen_done||[]).map(esc).join(' / ')}</div>`;
  if(st.allergen_todo) h += `<div class="meta" style="color:#c0392b">没吃过·别首试：${(st.allergen_todo||[]).map(esc).join(' / ')}</div>`;
  h += '</div>';
  if(g.iron_rule) h += `<div class="warn">🚨 ${esc(g.iron_rule)}</div>`;
  if(g.buy_safe){
    h += '<div class="sec-title">✅ 放心买（对应已吃口味）</div>';
    g.buy_safe.forEach(b=>{ h += `<div class="card"><h3>${esc(b.cat)}</h3><div class="meta">${esc(b.why||'')}\n👉 ${esc(b.pick||'')}</div></div>`; });
  }
  if(g.avoid){
    h += '<div class="card" style="border-left:4px solid var(--warn)"><h3>⚠ 看成分避开 / 谨慎</h3><div class="meta">'+(g.avoid||[]).map(a=>'· '+esc(a)).join('\n')+'</div></div>';
  }
  if(g.qty_heat) h += `<div class="card"><h3>📦 数量 & 加热</h3><div class="meta">${esc(g.qty_heat)}</div></div>`;
  if(g.buy_where) h += `<div class="card"><h3>🛒 哪里买</h3><div class="meta">${esc(g.buy_where)}</div></div>`;
  if(g.before_departure) h += `<div class="card" style="background:#fff8e8"><h3>💡 出发前在家（可选）</h3><div class="meta">${esc(g.before_departure)}</div></div>`;
  if(g.source) h += `<div class="meta" style="font-size:11px;color:#999;margin-top:10px">📋 ${esc(g.source)}</div>`;
  $('v-baby').innerHTML = h;
}

function renderFallbacks(){
  let h='<div class="sec-title">天气 / 突发 备选</div>';
  (STATE.fallbacks||[]).forEach(fb=>{
    h+=`<div class="card"><h3>${esc(fb.trigger||'')}</h3><div class="meta"><b>→ ${esc(fb.action||'')}</b>\n${esc(fb.detail||'')}</div></div>`;
  });
  $('v-fb').innerHTML=h;
}

function renderTodos(){
  let h='<div class="sec-title">出发前清单</div>';
  (STATE.predeparture_todo||[]).forEach(t=>{
    h+=`<div class="todo"><span class="bx">${t.done?'✅':'⬜'}</span><span>${esc(t.label)}</span></div>`;
  });
  if(STATE.packing&&STATE.packing.length){
    h+='<div class="sec-title">行李</div>';
    STATE.packing.forEach(c=>{ h+=`<div class="card"><h3>${esc(c.cat)}</h3><div class="meta">${(c.items||[]).map(esc).join('\n')}</div></div>`; });
  }
  $('v-todo').innerHTML=h;
}

function renderSos(){
  const e=STATE.emergency||{};
  let h='<div class="sec-title">紧急联系</div><div class="card"><div class="meta">'+
    `🚓 警察 ${esc(e.police||'110')}\n🚑 救护/火灾 ${esc(e.ambulance||'119')}\n`+
    `🏛 中国驻札幌总领事馆 ${esc(e.embassy||'')}\n`+
    (e.local_contact?`🚗 ${esc(e.local_contact.name||'')} ${esc(e.local_contact.phone||'')}\n`:'')+
    `🛡 保险 ${esc(e.insurance_24h||'(出发前填)')}</div></div>`;
  $('v-sos').innerHTML=h;
}

init();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
</body>
</html>
